<!DOCTYPE html>

</head>
<body>

<nav class="nav">
    <div class="container">
        <div class="logo">
            <a href="#">YourLogo</a>
        </div>
        <div class="main_list" id="mainListDiv">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">my work</a></li>
                <li><a href="#">disegn</a></li>
                <li><a href="#">dcontact</a></li>
            </ul>
        </div>
        <div class="media_button">
            <button class="main_media_button" id="mediaButton">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</nav>
    
<section id="roww">
    <div class="row">
        <div class="column" style="background-color:#aaa;">
            <div class="centered">
                <h3 class="subtitle">Introduction</h3>
                <h2>Pratishtha Singh</h2>
                <p>I design and develop services for customers of all sizes, specializing in creating stylish,
                    modern websites, web services and online stores.</p>
            </div>

        </div>
        <div class="column" style="background-color:#bbb;">
            <div class="container2">
            <div class="box1">
                <div class="box2">
                    <div class="box2-image">
                        <img src="IMG_20201207_110423_630 (2).jpg" alt="image">

                    </div>
                    <div class="box2-heading">
                        <h3>HI THERE! </h3>

                    </div>
                    <div class="para">
                        <h1>
                            <a href="" class="typewrite" data-period="2000"
                                data-type='[ "Hi, Im Si.", "I am Creative.", "I Love Design.", "I Love to Develop." ]'>
                                <span class="wrap"></span>
                            </a>
                        </h1>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>
</section>
<section id="next">
    <h2> hii </h2>
</section>



<script>
var mainListDiv = document.getElementById("mainListDiv"),
    mediaButton = document.getElementById("mediaButton");

mediaButton.onclick = function () {
    
    "use strict";
    
    mainListDiv.classList.toggle("show_list");
    mediaButton.classList.toggle("active");
    
};
var TxtType = function(el, toRotate, period) {
    this.toRotate = toRotate;
    this.el = el;
    this.loopNum = 0;
    this.period = parseInt(period, 10) || 2000;
    this.txt = '';
    this.tick();
    this.isDeleting = false;
};

TxtType.prototype.tick = function() {
    var i = this.loopNum % this.toRotate.length;
    var fullTxt = this.toRotate[i];

    if (this.isDeleting) {
    this.txt = fullTxt.substring(0, this.txt.length - 1);
    } else {
    this.txt = fullTxt.substring(0, this.txt.length + 1);
    }

    this.el.innerHTML = '<span class="wrap">'+this.txt+'</span>';

    var that = this;
    var delta = 200 - Math.random() * 100;

    if (this.isDeleting) { delta /= 2; }

    if (!this.isDeleting && this.txt === fullTxt) {
    delta = this.period;
    this.isDeleting = true;
    } else if (this.isDeleting && this.txt === '') {
    this.isDeleting = false;
    this.loopNum++;
    delta = 500;
    }

    setTimeout(function() {
    that.tick();
    }, delta);
};

window.onload = function() {
    var elements = document.getElementsByClassName('typewrite');
    for (var i=0; i<elements.length; i++) {
        var toRotate = elements[i].getAttribute('data-type');
        var period = elements[i].getAttribute('data-period');
        if (toRotate) {
          new TxtType(elements[i], JSON.parse(toRotate), period);
        }
    }
    // INJECT CSS
   
};

</script>
</body>
</html>
